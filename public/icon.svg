<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <circle cx="256" cy="256" r="256" fill="#111827"/>

  <!-- Notebook body -->
  <rect x="130" y="160" width="252" height="240" rx="16" fill="#1e3a2f"/>
  <rect x="130" y="160" width="252" height="240" rx="16" fill="none" stroke="#16a34a" stroke-width="6"/>

  <!-- Notebook spine -->
  <rect x="130" y="160" width="32" height="240" rx="8" fill="#16a34a"/>

  <!-- Spiral rings on spine -->
  <circle cx="146" cy="210" r="10" fill="none" stroke="#111827" stroke-width="5"/>
  <circle cx="146" cy="250" r="10" fill="none" stroke="#111827" stroke-width="5"/>
  <circle cx="146" cy="290" r="10" fill="none" stroke="#111827" stroke-width="5"/>
  <circle cx="146" cy="330" r="10" fill="none" stroke="#111827" stroke-width="5"/>
  <circle cx="146" cy="370" r="10" fill="none" stroke="#111827" stroke-width="5"/>

  <!-- Notebook lines -->
  <line x1="185" y1="220" x2="355" y2="220" stroke="#16a34a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="185" y1="250" x2="355" y2="250" stroke="#16a34a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="185" y1="280" x2="355" y2="280" stroke="#16a34a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="185" y1="310" x2="310" y2="310" stroke="#16a34a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Tennis ball (overlapping bottom-right of notebook) -->
  <circle cx="330" cy="340" r="70" fill="#d4f725"/>
  <!-- Tennis ball seams -->
  <path d="M290 300 C275 315, 275 365, 290 380" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <path d="M370 300 C385 315, 385 365, 370 380" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Pencil (diagonal, top-right) -->
  <g transform="rotate(-40, 370, 150)">
    <rect x="350" y="95" width="20" height="90" rx="3" fill="#f59e0b"/>
    <polygon points="350,185 370,185 360,210" fill="#fcd34d"/>
    <polygon points="353,205 367,205 360,218" fill="#374151"/>
    <rect x="350" y="88" width="20" height="12" rx="2" fill="#9ca3af"/>
    <rect x="352" y="82" width="16" height="9" rx="2" fill="#f87171"/>
  </g>
</svg>
